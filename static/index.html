<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Meeting Recording - 上传录音</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/static/index.html" class="nav-logo">📝 My Meeting Recording</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/static/index.html" class="active">上传录音</a></li>
                <li class="nav-item"><a href="/static/history.html">历史记录</a></li>
                <li class="nav-item"><a href="/static/settings.html">设置</a></li>
            </ul>
        </nav>

        <main>
            <section class="upload-section">
                <h2>上传录音</h2>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="audioFile">选择音频文件（最大300MB）</label>
                        <input type="file" id="audioFile" name="file" accept=".mp3,.m4a,.wav,.webm,.mp4,.mpeg" required>
                        <small>支持格式：MP3, M4A, WAV, WEBM, MP4</small>
                    </div>

                    <div class="form-group">
                        <label for="title">会议标题（可选）</label>
                        <input type="text" id="title" name="title" placeholder="留空自动生成">
                    </div>

                    <button type="submit" id="uploadBtn">上传并开始转写</button>
                </form>

                <div id="uploadProgress" class="progress hidden">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <p id="progressText">准备中...</p>
                </div>
            </section>

            <section class="meetings-section">
                <h2>最近会议</h2>
                <div id="meetingsList" class="meetings-list">
                    <p>加载中...</p>
                </div>
                <a href="/static/history.html" class="btn-secondary">查看所有会议 →</a>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 My Meeting Recording | Powered by AI</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
