<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议详情 - My Meeting Recording</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .detail-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .detail-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
        }

        .detail-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .detail-header .meta {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .detail-content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .transcript-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .transcript-speaker {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .transcript-time {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 5px;
        }

        .transcript-text {
            color: #333;
            line-height: 1.6;
        }

        .speaker-mapping {
            display: inline-block;
            margin: 5px;
            padding: 5px 10px;
            background: #e3e7ff;
            border-radius: 15px;
            font-size: 0.9em;
        }

        .summary-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .summary-version {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 10px;
        }

        .summary-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .speaker-edit {
            display: inline-block;
            padding: 2px 8px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-left: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container detail-container">
        <div class="detail-header">
            <a href="/static/index.html" class="back-link">← 返回首页</a>
            <h1 id="meetingTitle">加载中...</h1>
            <div class="meta">
                <span id="meetingDate"></span> |
                <span id="meetingStatus"></span>
            </div>
        </div>

        <div class="detail-content">
            <!-- Speaker Naming -->
            <section class="section">
                <h2>说话人管理</h2>
                <div id="speakerList" class="speaker-list">
                    <p>加载中...</p>
                </div>
            </section>

            <!-- Transcription -->
            <section class="section">
                <h2>转写结果</h2>
                <div id="transcriptList">
                    <p>加载中...</p>
                </div>
            </section>

            <!-- Generate Summary -->
            <section class="section">
                <h2>生成会议纪要</h2>
                <form id="summaryForm">
                    <div class="form-group">
                        <label for="promptTemplate">提示词模板</label>
                        <select id="promptTemplate" name="template">
                            <option value="">自定义提示词</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="promptInput">提示词</label>
                        <textarea id="promptInput" name="prompt" rows="3" placeholder="请输入生成纪要的提示词..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="saveAsTemplate" name="save_as_template">
                            保存为模板
                        </label>
                        <input type="text" id="templateName" name="template_name" placeholder="模板名称" style="display:none; margin-top:10px;">
                    </div>

                    <button type="submit" id="generateBtn">生成纪要</button>
                </form>
            </section>

            <!-- Summaries -->
            <section class="section">
                <h2>会议纪要版本</h2>
                <div id="summariesList">
                    <p>暂无纪要</p>
                </div>
            </section>

            <!-- Audio Cleanup -->
            <section class="section">
                <h2>音频管理</h2>
                <div id="audioSection">
                    <p id="audioStatus">加载中...</p>
                    <button id="deleteAudioBtn" class="btn-danger" style="display:none;">删除音频文件</button>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/detail.js"></script>
</body>
</html>
