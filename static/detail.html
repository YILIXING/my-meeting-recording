<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议详情 - My Meeting Recording</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .transcript-item {
            padding: 15px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .transcript-speaker {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .transcript-time {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 5px;
        }

        .transcript-text {
            color: #333;
            line-height: 1.6;
        }

        .speaker-mapping {
            display: inline-block;
            margin: 5px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #e8ecff 0%, #dce4ff 100%);
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .summary-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .summary-version {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 10px;
        }

        .summary-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .speaker-edit {
            display: inline-block;
            padding: 3px 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-left: 8px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .meeting-meta {
            display: flex;
            gap: 15px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/static/index.html" class="nav-logo">📝 My Meeting Recording</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/static/index.html">上传录音</a></li>
                <li class="nav-item"><a href="/static/history.html">历史记录</a></li>
                <li class="nav-item"><a href="/static/settings.html">设置</a></li>
            </ul>
        </nav>

        <header style="padding-top: 30px;">
            <h1 id="meetingTitle">加载中...</h1>
            <div class="meeting-meta">
                <span id="meetingDate"></span>
                <span>|</span>
                <span id="meetingStatus"></span>
            </div>
        </header>

        <main>
            <!-- Speaker Naming -->
            <section>
                <h2>说话人管理</h2>
                <div id="speakerList" class="speaker-list">
                    <p>加载中...</p>
                </div>
            </section>

            <!-- Transcription -->
            <section>
                <h2>转写结果</h2>
                <div id="transcriptList">
                    <p>加载中...</p>
                </div>
            </section>

            <!-- Generate Summary -->
            <section>
                <h2>生成会议纪要</h2>
                <form id="summaryForm">
                    <div class="form-group">
                        <label for="promptTemplate">提示词模板</label>
                        <select id="promptTemplate" name="template">
                            <option value="">自定义提示词</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="promptInput">提示词</label>
                        <textarea id="promptInput" name="prompt" rows="3" placeholder="请输入生成纪要的提示词..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="saveAsTemplate" name="save_as_template">
                            保存为模板
                        </label>
                        <input type="text" id="templateName" name="template_name" placeholder="模板名称" style="display:none; margin-top:10px;">
                    </div>

                    <button type="submit" id="generateBtn">生成纪要</button>
                </form>
            </section>

            <!-- Summaries -->
            <section>
                <h2>会议纪要版本</h2>
                <div id="summariesList">
                    <p>暂无纪要</p>
                </div>
            </section>

            <!-- Audio Cleanup -->
            <section>
                <h2>音频管理</h2>
                <div id="audioSection">
                    <p id="audioStatus">加载中...</p>
                    <button id="deleteAudioBtn" class="btn-danger" style="display:none;">删除音频文件</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 My Meeting Recording | Powered by AI</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/detail.js"></script>
</body>
</html>
