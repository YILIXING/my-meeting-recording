<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - My Meeting Recording</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .meetings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 1em;
            background: #fafafa;
        }

        .filter-bar select:focus,
        .filter-bar input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/static/index.html" class="nav-logo">📝 My Meeting Recording</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/static/index.html">上传录音</a></li>
                <li class="nav-item"><a href="/static/history.html" class="active">历史记录</a></li>
                <li class="nav-item"><a href="/static/settings.html">设置</a></li>
            </ul>
        </nav>

        <main>
            <section>
                <h2>📚 会议历史记录</h2>

                <div class="filter-bar">
                    <select id="statusFilter">
                        <option value="">所有状态</option>
                        <option value="completed">已完成</option>
                        <option value="transcribing">转写中</option>
                        <option value="generating">生成纪要中</option>
                        <option value="failed">失败</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="搜索会议标题...">
                </div>

                <div id="meetingsGrid" class="meetings-grid">
                    <div class="empty-state">
                        <h3>加载中...</h3>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/history.js"></script>
</body>
</html>
