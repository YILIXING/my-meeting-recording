<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - My Meeting Recording</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .history-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .history-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .history-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .history-content {
            padding: 40px;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
        }

        .meetings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .meeting-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border-left: 4px solid #667eea;
        }

        .meeting-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .meeting-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .meeting-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .meeting-card .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-completed { background: #d4edda; color: #155724; }
        .status-transcribing { background: #fff3cd; color: #856404; }
        .status-failed { background: #f8d7da; color: #721c24; }
        .status-generating { background: #cce5ff; color: #004085; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container history-container">
        <div class="history-header">
            <h1>📚 会议历史记录</h1>
        </div>

        <div class="history-content">
            <a href="/static/index.html" class="back-link">← 返回首页</a>

            <div class="filter-bar">
                <select id="statusFilter">
                    <option value="">所有状态</option>
                    <option value="completed">已完成</option>
                    <option value="transcribing">转写中</option>
                    <option value="generating">生成纪要中</option>
                    <option value="failed">失败</option>
                </select>
                <input type="text" id="searchInput" placeholder="搜索会议标题...">
            </div>

            <div id="meetingsGrid" class="meetings-grid">
                <div class="empty-state">
                    <h3>加载中...</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/history.js"></script>
</body>
</html>
