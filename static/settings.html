<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - My Meeting Recording</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .config-section {
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .config-section h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-validate {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-validate:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }

        .validation-result {
            margin-top: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        .validation-result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .validation-result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .api-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
            margin-left: auto;
        }

        .api-status.configured {
            background: #d4edda;
            color: #155724;
        }

        .api-status.not-configured {
            background: #f8d7da;
            color: #721c24;
        }

        .config-section h3 {
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/static/index.html" class="nav-logo">📝 My Meeting Recording</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/static/index.html">上传录音</a></li>
                <li class="nav-item"><a href="/static/history.html">历史记录</a></li>
                <li class="nav-item"><a href="/static/settings.html" class="active">设置</a></li>
            </ul>
        </nav>

        <main>
            <!-- Default Service Selection -->
            <section class="config-section">
                <h3>⚙️ 默认LLM服务</h3>
                <form id="defaultServiceForm">
                    <div class="form-group">
                        <label for="defaultService">选择默认服务</label>
                        <select id="defaultService" name="service">
                            <option value="doubao">豆包（推荐）</option>
                            <option value="qianwen">千问</option>
                            <option value="claude">Claude</option>
                            <option value="openai">OpenAI</option>
                            <option value="zhipuai">智谱GLM</option>
                        </select>
                        <small>选择用于转写和纪要生成的默认AI服务</small>
                    </div>
                    <button type="submit">保存设置</button>
                </form>
            </section>

            <!-- Doubao Configuration -->
            <section class="config-section">
                <h3>
                    <span>🔷 豆包（火山引擎）</span>
                    <span id="doubaoStatus" class="api-status">检查中...</span>
                </h3>
                <form id="doubaoForm">
                    <div class="form-group">
                        <label for="doubaoApiKey">API Key</label>
                        <input type="password" id="doubaoApiKey" name="api_key" placeholder="输入豆包API Key">
                        <small>在<a href="https://console.volcengine.com/ark" target="_blank">火山引擎控制台</a>获取</small>
                    </div>
                    <div class="form-group">
                        <label for="doubaoAppId">App ID</label>
                        <input type="text" id="doubaoAppId" name="app_id" placeholder="输入豆包ARK App ID">
                        <small>用于音频转写功能（可选）</small>
                    </div>
                    <div class="form-group">
                        <label for="doubaoModel">模型</label>
                        <input type="text" id="doubaoModel" name="model" value="doubao-pro-4k">
                        <small>可选：doubao-pro-4k, doubao-pro-32k</small>
                    </div>
                    <div class="btn-group">
                        <button type="submit">保存配置</button>
                        <button type="button" class="btn-validate" onclick="validateService('doubao')">验证配置</button>
                    </div>
                    <div id="doubaoValidation" class="validation-result"></div>
                </form>
            </section>

            <!-- Other services can be added similarly -->

        </main>

        <footer>
            <p>&copy; 2026 My Meeting Recording | Powered by AI</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/settings.js"></script>
</body>
</html>
